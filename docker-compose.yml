version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: agrisense-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DATABASE_URL=sqlite:///./agrisense.db
    volumes:
      - ./backend/agrisense.db:/app/backend/agrisense.db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: agrisense-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
